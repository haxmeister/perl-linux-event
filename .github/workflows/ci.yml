name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        perl: ['5.36', '5.38', '5.40', '5.42']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: Install dependencies
        run: |
          cpanm --notest --quiet --skip-satisfied --installdeps .
          cpanm --notest --quiet --skip-satisfied Linux::FD::Event Linux::FD::Pid || true

      - name: Build and test
        run: |
          perl Makefile.PL
          make
          make test

      - name: Syntax-check examples
        run: |
          for f in examples/*.pl; do
            base="$(basename "$f")"
            [ "$base" = "all.pl" ] && continue
            [ "$base" = "08-waker-thread.pl" ] && continue
            perl -Mblib -c "$f"
          done

      - name: Run examples
        run: |
          LINUX_EVENT_SKIP_THREAD_EXAMPLE=1 perl -Mblib examples/all.pl
